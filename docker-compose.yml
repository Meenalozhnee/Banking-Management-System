version: '3.8'

services:
  mysqldb:
    image: mysql:8.0
    container_name: banking_mysqldb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bank_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Optionally, run the schema file on startup
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  db_data:
